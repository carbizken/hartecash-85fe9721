<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preconnect to Supabase storage for faster LCP image load -->
    <link rel="preconnect" href="https://ptiwdwfdckfqivoocyvp.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://ptiwdwfdckfqivoocyvp.supabase.co" />
    <!-- Preload Google Fonts to avoid render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="image" href="https://ptiwdwfdckfqivoocyvp.supabase.co/storage/v1/object/public/staff-avatars/branding/logo_url_1775436491143.png" fetchpriority="high" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#003366" />
    <link rel="apple-touch-icon" href="/pwa-icon-512.png" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Sell Your Car - Get Cash Offer in 2 Minutes | Harte Auto Group</title>
    <meta name="description" content="Get a top-dollar cash offer for your car in 2 minutes. Free pickup, no obligation. Harte Auto Group — trusted since 1952.">
    <meta name="author" content="Harte Auto Group" />

    
    
    <!-- OG/Twitter tags managed dynamically by react-helmet-async -->
</head>

  <body>
    <div id="root">
      <!-- Inline skeleton for fast FCP — replaced by React on mount -->
      <style>
        .ll-sk{display:flex;flex-direction:column;min-height:100vh;background:#fff;font-family:system-ui,sans-serif}
        .ll-sk-h{height:88px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 20px}
        .ll-sk-logo{width:108px;height:72px;background:#f3f4f6;border-radius:8px}
        .ll-sk-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 20px}
        .ll-sk-pulse{animation:ll-p 1.5s ease-in-out infinite}
        @keyframes ll-p{0%,100%{opacity:.4}50%{opacity:1}}
        .ll-sk-bar{height:14px;background:#e5e7eb;border-radius:7px}
      </style>
      <div class="ll-sk">
        <div class="ll-sk-h"><div class="ll-sk-logo ll-sk-pulse"></div></div>
        <div class="ll-sk-main">
          <div class="ll-sk-bar ll-sk-pulse" style="width:260px"></div>
          <div class="ll-sk-bar ll-sk-pulse" style="width:200px"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
